<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trends Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa;
    --white: #ffffff;
    --text: #1d1d1f;
    --text-2: #424245;
    --text-3: #86868b;
    --text-4: #afafb2;
    --border: #e8e8ed;
    --border-light: #f2f2f7;
    --accent: #0071e3;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 14px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 24px 100px;
  }

  .hero {
    padding: 100px 0 64px;
    text-align: center;
  }
  .hero .overline {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .hero h1 {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -1.5px;
    color: var(--text);
    margin-bottom: 16px;
  }
  .hero p {
    font-size: 17px;
    color: var(--text-3);
    max-width: 380px;
    margin: 0 auto;
    line-height: 1.55;
    font-weight: 400;
  }

  .issues {
    list-style: none;
    margin-top: 8px;
  }

  .issue {
    background: var(--white);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 10px;
    transition: box-shadow 0.25s, transform 0.15s;
  }
  .issue:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .issue a {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 26px;
    text-decoration: none;
    color: var(--text);
  }
  .issue .info {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .issue .issue-date {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .issue .issue-preview {
    font-size: 13px;
    color: var(--text-3);
    font-weight: 400;
  }
  .issue .arrow {
    font-size: 18px;
    color: var(--text-4);
    transition: color 0.2s;
  }
  .issue:hover .arrow { color: var(--accent); }
  .issue.latest .badge {
    font-size: 11px;
    font-weight: 600;
    color: #248a3d;
    background: #34c7590d;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .footer-note {
    text-align: center;
    margin-top: 48px;
  }
  .footer-note p {
    font-size: 14px;
    color: var(--text-3);
  }
  .footer-note .sub {
    font-size: 13px;
    color: var(--text-4);
    margin-top: 4px;
  }

  .footer {
    text-align: center;
    margin-top: 56px;
    font-size: 12px;
    color: var(--text-4);
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="container">

  <div class="hero">
    <div class="overline">Weekly Newsletter</div>
    <h1>AI Trends Scout</h1>
    <p>Curated AI use cases and techniques for entrepreneurs and builders.</p>
  </div>

  <ul class="issues">
    <li class="issue latest">
      <a href="digest-2026-04-03.html">
        <div class="info">
          <span class="issue-date">April 3, 2026</span>
          <span class="issue-preview">Worktree agents, Codex plugin, SwiftUI vibe coding</span>
        </div>
        <span class="badge">Latest</span>
      </a>
    </li>
  </ul>

  <div class="footer-note">
    <p>New issue every Monday morning.</p>
    <p class="sub">Bookmark this page or share the link.</p>
  </div>

  <div class="footer">
    <p>Built with <a href="https://claude.ai/code">Claude Code</a></p>
  </div>

</div>
</body>
</html>
